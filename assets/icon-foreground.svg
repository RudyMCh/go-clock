<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="stone" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3A3A3E"/>
      <stop offset="100%" stop-color="#141416"/>
    </radialGradient>
    <radialGradient id="sheen" cx="33%" cy="28%" r="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Go stone (slightly smaller for adaptive icon safe zone) -->
  <circle cx="512" cy="512" r="320" fill="url(#stone)"/>
  <circle cx="512" cy="512" r="320" fill="url(#sheen)"/>

  <!-- Hour hand — 10 o'clock -->
  <line x1="512" y1="512" x2="512" y2="332"
        stroke="#F5A623" stroke-width="28" stroke-linecap="round"
        transform="rotate(-60, 512, 512)"/>

  <!-- Minute hand — 10 minutes -->
  <line x1="512" y1="512" x2="512" y2="282"
        stroke="#F5A623" stroke-width="18" stroke-linecap="round"
        transform="rotate(60, 512, 512)"/>

  <!-- Center pivot -->
  <circle cx="512" cy="512" r="18" fill="#F5A623"/>
</svg>
